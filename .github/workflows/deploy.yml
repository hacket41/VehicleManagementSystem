name: Deploy Backend to Azure

on:
    push:
        branches:
            - main
        paths:
            - "backend/**"

env:
    ACR_REGISTRY: nepautobackend.azurecr.io
    IMAGE_NAME: nepautoapi
    CONTAINER_APP_NAME: nepautoapi
    RESOURCE_GROUP: nepauto

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Login to ACR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.ACR_REGISTRY }}
                  username: ${{ secrets.ACR_USERNAME }}
                  password: ${{ secrets.ACR_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  push: true
                  tags: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            - name: Deploy to Container App
              uses: azure/container-apps-deploy-action@v1
              with:
                  resourceGroup: ${{ env.RESOURCE_GROUP }}
                  containerAppName: ${{ env.CONTAINER_APP_NAME }}
                  imageToDeploy: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                  registryUrl: ${{ env.ACR_REGISTRY }}
                  registryUsername: ${{ secrets.ACR_USERNAME }}
                  registryPassword: ${{ secrets.ACR_PASSWORD }}
